services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: integration_mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "14334:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q \"SELECT 1\" -b -o /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  mysql:
    image: mariadb:11.4
    container_name: integration_mysql
    environment:
      MARIADB_ROOT_PASSWORD: "rootpass"
      MARIADB_DATABASE: "PAYROLL"
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
